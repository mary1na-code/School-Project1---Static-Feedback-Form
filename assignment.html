<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>

    <!-- This is the site's style -->
    <style>
        *{
            box-sizing: border-box;
        }

        p{
            color:rgb(116, 113, 116);
            margin: auto;
        }
        
        form{
            display: flex;
            flex-direction: column;
            gap:20px;
            
            width:550px;
            height:auto;
            background-color:#4D4566;
            padding-block:20px;
        }

        div{
            margin: auto;
        }

        .inputs{
            display:flex;
            flex-direction: column;
            align-items: start;
            gap:10px;
            width:auto;
        }

        .inputs input{
            width:300px;
            height:30px;
            border-radius:10px;
            padding-inline:10px;
            border:none;
        }

        form input{
            width:300px;
            height:auto;
            border-radius:10px;
            padding-inline:10px;
            border:none;
        }

        textarea{
            border:none;
            width:300px;
            resize: none;
            margin: auto;
            border-radius:12px 0px 12px 0px;
            padding: 10px;        
        }

        button{
            width:150px;
            height:25px;
            border-radius:7px;
            border:none;
            background-color:purple;
            color:white;
            margin: auto;
        }
    </style>
</head>
<body>
    <form>
        <P>Please Leave a Feedback</P>

        <div class="inputs">
            <input type="text" placeholder="Enter Your Name" required>
            <input type="text" placeholder="Enter Your Email" required>
        </div>

        <textarea name="Feedback" id="feedback" rows="6"  placeholder="Enter your feedback..." required ></textarea>
        <button>Submit</button>
        
    </form>
</body>
</html>
